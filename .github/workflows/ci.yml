name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-syntax:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Syntax check (compileall)
        run: python -m compileall -q agents models prompts services workflows scripts main.py config.py

      - name: Lint with Ruff (non-blocking)
        continue-on-error: true
        run: ruff check . --output-format=github

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: semantic-video-replication:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          set +e
          PATTERNS="AIzaSy[A-Za-z0-9_-]{20}|sk-[a-zA-Z0-9]{30,}|sk_[a-zA-Z0-9]{40,}|ark-[a-f0-9-]{30,}|patsMug[a-zA-Z0-9.]+|LTAI5t[a-zA-Z0-9]+|tvly-(dev|prod)-[a-zA-Z0-9]+"
          MATCHES=$(grep -rEn "$PATTERNS" \
            --include="*.py" --include="*.yml" --include="*.yaml" \
            --include="*.json" --include="*.md" \
            --exclude-dir=".git" --exclude-dir=".venv" \
            --exclude-dir="tmp" --exclude-dir="archive" . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Hardcoded secrets detected!"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"

      - name: Verify .env is not committed
        run: |
          if [ -f ".env" ]; then
            echo "::error::.env file should never be committed!"
            exit 1
          fi
          echo "✓ .env is not committed"
